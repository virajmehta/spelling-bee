<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gambler — Spelling Bee Pool</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/gambler.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="flex-between">
        <h1>Betting Floor</h1>
        <button class="btn btn--outline btn--sm" id="logout-btn">Leave Room</button>
      </div>
      <div class="subtitle" id="room-info">Loading...</div>
    </div>

    <div id="status-bar"></div>

    <!-- Balance -->
    <div class="balance-hero">
      <div class="balance-label">Your Chips</div>
      <div class="balance-amount" id="balance">0</div>
    </div>

    <!-- Betting Banner -->
    <div id="betting-banner"></div>

    <!-- Live Turn -->
    <div id="live-turn" style="display:none"></div>

    <!-- Upcoming Spellers (during round) -->
    <div id="upcoming-spellers" style="display:none"></div>

    <!-- Place Bet -->
    <div class="card" id="bet-section">
      <div class="card-header"><h2>Place a Bet</h2></div>
      <div class="bet-form">
        <div class="form-group" style="flex:2;margin:0">
          <select id="bet-speller">
            <option value="">Pick a speller...</option>
          </select>
        </div>
        <div class="form-group" style="flex:1;margin:0">
          <input type="number" id="bet-amount" placeholder="Amount" min="1">
        </div>
        <button class="btn btn--gold" id="place-bet-btn">Bet</button>
      </div>
      <div class="bet-quick-amounts" id="quick-amounts"></div>
    </div>

    <!-- Odds Board -->
    <div class="card">
      <div class="card-header"><h2>Odds Board</h2></div>
      <div id="odds-board"></div>
    </div>

    <!-- My Bets -->
    <div class="card">
      <div class="card-header">
        <h2>My Bets</h2>
        <span id="bet-count" class="text-sm text-gray"></span>
      </div>
      <div id="my-bets"></div>
    </div>

    <!-- Recent Activity -->
    <div class="card">
      <div class="card-header"><h2>Recent Activity</h2></div>
      <div id="recent-activity"></div>
    </div>

    <!-- Spellers -->
    <div class="card">
      <div class="card-header"><h2>Spellers</h2></div>
      <div id="speller-list"></div>
    </div>
  </div>

  <script type="module" src="/js/gambler-app.js"></script>
</body>
</html>
